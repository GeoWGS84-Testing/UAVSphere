name: Playwright Tests

on:
  # Schedule to run every 20 minutes
  schedule:
    - cron: '*/20 * * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Prevents multiple workflows from running at the same time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      env:
        # --- Test Credentials ---
        TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
        TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        
        # --- Email Reporting Secrets (MUST be set in GitHub Settings > Secrets) ---
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        SMTP_FROM: ${{ secrets.SMTP_FROM }}
        FAILURE_ALERT_EMAILS: ${{ secrets.FAILURE_ALERT_EMAILS }}
        DAILY_REPORT_EMAILS: ${{ secrets.DAILY_REPORT_EMAILS }}
        
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30